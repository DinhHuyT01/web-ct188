<script>

function hienThi(menu){

    document.getElementById("htmlMenu").style.display="none";
    document.getElementById("cssMenu").style.display="none";
    document.getElementById("jsMenu").style.display="none";
    document.getElementById(menu).style.display="block";

}

</script>

    </nav>
    <div class="chude">
        <a onclick="hienThi('htmlMenu')">HTML</a>
