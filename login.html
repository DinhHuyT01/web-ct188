<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Hệ thống - CTU</title>
    <link rel="stylesheet" href="CSS/login-style.css">
</head>
<body>

    <div class="container">
        <main class="login-card">
            
            <div class="logo-area">
                <img src="HinhAnh/logo.png" alt="Logo CTU">
                <h1>Easy Code</h1>
                <p>Học phần: Nhập môn lập trình Web (CT188)</p>
            </div>

            <form id="loginForm" class="form-content">
                <div class="form-group">
                    <label for="username">Tên đăng nhập:</label>
                    <input type="text" id="username" placeholder="Nhập tài khoản..." required>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu:</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu..." required>
                </div>

                <p id="errorMessage" class="msg-error">Tài khoản hoặc mật khẩu không đúng!</p>

                <button type="submit" class="btn-login">ĐĂNG NHẬP</button>
            </form>

            <footer class="card-footer">
                <small>© 2026 Easy Code. All rights reserved. Được thực hiện bởi EASY CODE</small>
            </footer>
            
        </main>
    </div>

    <script src="JS/account.js"></script>
</body>
</html>
